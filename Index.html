<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --navy: #17324d;
      --blue: #2563eb;
      --blue-soft: #eaf2ff;
      --ink: #1f2937;
      --muted: #64748b;
      --line: #dbe4ee;
      --paper: #ffffff;
      --bg: #f5f8fc;
      --green: #14804a;
      --red: #b42318;
      --shadow: 0 14px 35px rgba(28, 50, 74, .10);
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    body { margin: 0; color: var(--ink); background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif; }
    button, input, select, textarea { font: inherit; }
    button { min-height: 46px; cursor: pointer; touch-action: manipulation; }
    button:disabled { cursor: default; opacity: .42; }
    .topbar { background: linear-gradient(120deg, #17324d, #225886); color: white; padding: 20px; box-shadow: var(--shadow); }
    .topbar-inner { width: min(920px, 100%); margin: auto; display: flex; align-items: center; justify-content: center; gap: 14px; text-align: center; }
    .brand-mark { width: 42px; height: 42px; display: block; object-fit: cover; padding: 3px; border-radius: 13px; background: white; font-weight: 800; }
    h1 { font-size: clamp(20px, 4vw, 28px); margin: 0; }
    .subtitle { margin: 3px 0 0; color: #dbeafe; font-size: 13px; }
    main { width: min(920px, calc(100% - 28px)); margin: 28px auto 60px; }
    .panel { background: var(--paper); border: 1px solid var(--line); border-radius: 18px; padding: clamp(18px, 4vw, 30px); box-shadow: var(--shadow); }
    .hidden { display: none !important; }
    .home { text-align: center; padding: clamp(35px, 8vw, 70px) 20px; }
    .home h2 { margin: 0 0 10px; font-size: clamp(24px, 5vw, 34px); color: var(--navy); }
    .home p { margin: 0 0 30px; color: var(--muted); }
    .home-actions { display: grid; grid-template-columns: minmax(0, 1fr); gap: 16px; max-width: 520px; margin: auto; }
    .mode-actions { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; max-width: 620px; margin: auto; }
    .big-button { min-height: 118px; padding: 20px; border: 1px solid #bed3ef; border-radius: 18px; background: #f8fbff; color: var(--navy); font-size: 19px; font-weight: 750; transition: .18s ease; }
    .big-button:hover { transform: translateY(-2px); border-color: var(--blue); box-shadow: 0 10px 22px rgba(37,99,235,.12); }
    .big-button span { display: block; margin-bottom: 7px; font-size: 28px; }
    .big-button strong { display: block; font-size: 19px; }
    .big-button small { display: block; margin-top: 8px; color: var(--muted); font-size: 12px; font-weight: 600; line-height: 1.5; }
    .section-head { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
    .section-head h2 { margin: 0; color: var(--navy); }
    .back { border: 0; background: var(--blue-soft); color: var(--blue); border-radius: 10px; padding: 8px 12px; font-weight: 700; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 7px; }
    .field.full { grid-column: 1 / -1; }
    .location-grid { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    .location-grid.single { grid-template-columns: minmax(0, 1fr); }
    label { color: #334155; font-size: 14px; font-weight: 700; }
    input, select, textarea { width: 100%; min-height: 48px; border: 1px solid #cbd5e1; border-radius: 11px; background: white; padding: 11px 12px; color: var(--ink); font-size: 16px; }
    input:focus, select:focus, textarea:focus { outline: 3px solid #dbeafe; border-color: var(--blue); }
    textarea { min-height: 90px; resize: vertical; }
    .check-option { min-height: 44px; display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 11px; background: #f8fafc; font-weight: 600; }
    .check-option input { width: 22px; min-height: 22px; height: 22px; margin: 0; accent-color: var(--blue); }
    .primary, .secondary, .danger-quiet { border: 0; border-radius: 11px; padding: 11px 18px; font-weight: 750; }
    .primary { color: white; background: var(--blue); }
    .secondary { color: var(--blue); background: var(--blue-soft); }
    .danger-quiet { color: var(--red); background: #fff1f0; }
    .button-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }
    .admin-schedule { display: grid; grid-template-columns: minmax(0, 1fr) 100px; gap: 14px; }
    .admin-schedule-main { min-width: 0; }
    .schedule-actions { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-top: 16px; }
    .schedule-actions button { width: 100%; padding: 10px 8px; }
    .reorder-actions { display: flex; flex-direction: column; gap: 10px; }
    .reorder-actions button { flex: 1 1 0; width: 100%; min-height: 72px; padding: 8px 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; border: 1px solid #bed3ef; }
    .reorder-actions .arrow { font-size: 28px; line-height: 1; }
    .reorder-actions .move-label { font-size: 13px; line-height: 1.25; }
    .notice { border-radius: 11px; padding: 11px 14px; margin: 0 0 16px; font-size: 14px; }
    .notice.ok { background: #ecfdf3; color: var(--green); }
    .notice.error { background: #fff1f0; color: var(--red); }
    .status-help { color: var(--muted); font-size: 16px; }
    .toolbar { display: flex; align-items: end; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .toolbar .field { flex: 1 1 190px; }
    .schedule-list { display: grid; gap: 12px; margin-top: 18px; }
    .schedule { border: 1px solid var(--line); border-radius: 14px; padding: 15px; background: #fbfdff; }
    .schedule-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .schedule h3 { margin: 0 0 5px; font-size: 17px; color: var(--navy); }
    .schedule p { margin: 3px 0; color: var(--muted); font-size: 14px; }
    .slots { display: grid; grid-template-columns: minmax(0, 1fr); gap: 10px; margin-top: 13px; }
    .slot { border: 1px solid #d9e5f3; border-radius: 11px; padding: 10px; background: white; }
    .slot strong { display: block; color: var(--navy); margin-bottom: 4px; }
    .slot button { width: 100%; margin-top: 8px; }
    .slot button.selected { background: #ea580c; color: white; }
    .badge { white-space: nowrap; background: #eef6ff; color: #245a8d; border-radius: 999px; padding: 5px 9px; font-size: 12px; font-weight: 750; }
    .divider { height: 1px; background: var(--line); margin: 26px 0; }
    .editor-title { margin: 0 0 15px; color: var(--navy); font-size: 19px; }
    .selected-entry { background: #f0f7ff; border: 1px solid #bed8f4; border-radius: 12px; padding: 12px 14px; margin-bottom: 14px; }
    .selected-entry ul { margin: 8px 0 0; padding-left: 20px; }
    .selection-item { margin-top: 12px; padding: 12px; border: 1px solid #bed8f4; border-radius: 10px; background: white; }
    .selection-item strong { display: block; margin-bottom: 8px; color: var(--navy); }
    .selection-item textarea { min-height: 70px; }
    .inline-entry { margin-top: 14px; padding: 15px; border: 1px solid #fdba74; border-radius: 13px; background: #fff7ed; }
    .inline-entry h4 { margin: 0 0 12px; color: var(--navy); }
    .loading { position: fixed; inset: 0; display: grid; place-items: center; background: rgba(245,248,252,.90); z-index: 100; touch-action: none; }
    .loader { display: flex; align-items: center; gap: 12px; background: white; border-radius: 14px; padding: 18px 24px; box-shadow: var(--shadow); color: var(--navy); font-weight: 750; }
    .spinner { width: 22px; height: 22px; border: 3px solid #bfdbfe; border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; color: var(--muted); padding: 22px; border: 1px dashed #cbd5e1; border-radius: 12px; }
    .status-block { margin: 18px 0 28px; overflow-x: auto; border: 1px solid #94a3b8; border-radius: 8px; background: white; -webkit-overflow-scrolling: touch; }
    .scroll-hint { display: flex; align-items: center; justify-content: center; gap: .5rem; margin: 18px 0 8px; padding: .55rem .7rem; border: 2px solid #fdba74; border-radius: 12px; background: #fff7ed; color: #9a3412; font-size: .86rem; font-weight: 800; text-align: center; }
    .scroll-hint-arrow { font-size: 1.25rem; line-height: 1; animation: slideHint 1.3s ease-in-out infinite alternate; }
    .status-table-wrap { position: relative; }
    .status-table-wrap .status-block { margin-top: 0; }
    .scroll-edge { position: absolute; z-index: 3; top: 1px; right: 1px; bottom: 29px; width: 2.2rem; display: grid; place-items: center; pointer-events: none; border-radius: 0 8px 8px 0; background: linear-gradient(90deg, rgba(255,255,255,0), rgba(234,88,12,.30)); color: #c2410c; font-size: 1.35rem; font-weight: 900; }
    @keyframes slideHint { from { transform: translateX(-.18rem); } to { transform: translateX(.18rem); } }
    .sheet-table { width: 100%; min-width: 1160px; border-collapse: collapse; table-layout: fixed; font-size: 12px; }
    .sheet-table th { padding: 8px 5px; border: 1px solid #64748b; background: #cfe0f8; color: #1e293b; font-weight: 750; text-align: center; }
    .sheet-table td { height: 34px; padding: 5px; border: 1px solid #94a3b8; text-align: center; vertical-align: middle; white-space: pre-line; overflow-wrap: anywhere; }
    .sheet-table .wide-cell { min-width: 105px; font-weight: 650; }
    .sheet-table tr.note-row td { color: #475569; font-size: 11px; }
    .sheet-table tr.name-row td.entry-cell { border-bottom: 0; }
    .sheet-table tr.note-row td.entry-cell { border-top: 0; }
    .sheet-table tr.period-end td { border-bottom: 1px solid #94a3b8; }
    .status-name { width: 100%; border: 0; border-radius: 6px; padding: 6px 3px; background: #eaf2ff; color: #174ea6; font-weight: 750; text-decoration: underline; }
    .status-name:hover { background: #dbeafe; }
    .modal { position: fixed; inset: 0; z-index: 80; display: grid; place-items: center; padding: 20px; background: rgba(15,23,42,.55); }
    .modal-card { width: min(430px, 100%); padding: 26px; border-radius: 17px; background: white; box-shadow: var(--shadow); text-align: center; }
    .modal-card h3 { margin: 0 0 10px; color: var(--navy); }
    .modal-card p { margin: 0; white-space: pre-line; }
    .modal-card .button-row { justify-content: center; }
    .size-control { position: sticky; top: 0; z-index: 60; display: flex; align-items: center; justify-content: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #f1c27d; background: #fff7ed; box-shadow: 0 5px 14px rgba(120, 72, 18, .10); }
    .size-control label { flex: 0 0 auto; margin: 0; color: #7c2d12; font-weight: 800; }
    .size-control input[type="range"] { flex: 1 1 280px; width: min(420px, 44vw); min-height: 36px; padding: 0; accent-color: #ea580c; }
    .size-control input[type="range"] { appearance: none; -webkit-appearance: none; height: 12px; border-radius: 999px; background: #fed7aa; }
    .size-control input[type="range"]::-webkit-slider-thumb { appearance: none; -webkit-appearance: none; width: 48px; height: 48px; border: 4px solid white; border-radius: 50%; background: #ea580c; box-shadow: 0 2px 8px rgba(124,45,18,.35); cursor: grab; }
    .size-control input[type="range"]::-moz-range-track { height: 12px; border-radius: 999px; background: #fed7aa; }
    .size-control input[type="range"]::-moz-range-thumb { width: 48px; height: 48px; border: 4px solid white; border-radius: 50%; background: #ea580c; box-shadow: 0 2px 8px rgba(124,45,18,.35); cursor: grab; }
    .size-control output { min-width: 74px; color: #9a3412; font-weight: 800; text-align: center; }
    .size-mark { color: #9a3412; font-weight: 800; }
    @media (max-width: 1000px), (hover: none), (pointer: coarse) {
      body { font-size: 34px; }
      .home-actions, .mode-actions, .grid, .slots, .location-grid { grid-template-columns: 1fr; }
      .topbar { padding: 16px 10px; }
      .topbar-inner { gap: 10px; }
      .brand-mark { width: 72px; height: 72px; flex: 0 0 72px; font-size: 29px; }
      h1 { font-size: 40px; }
      .subtitle { font-size: 27px; }
      main { width: calc(100% - 8px); margin: 10px auto 36px; }
      .panel { padding: 15px 12px; border-radius: 14px; }
      .home { padding: 28px 12px; }
      .home h2 { font-size: 50px; }
      .home p { margin-bottom: 30px; font-size: 31px; }
      .home-actions, .mode-actions { gap: 12px; }
      .big-button { min-height: 225px; padding: 34px 20px; }
      .big-button span { font-size: 60px; }
      .big-button strong { font-size: 41px; }
      .big-button small { font-size: 29px; line-height: 1.6; }
      .section-head { margin-bottom: 18px; }
      .section-head h2 { font-size: 42px; }
      label { font-size: 32px; }
      input, select, textarea { min-height: 104px; padding: 22px; font-size: 34px; }
      textarea { min-height: 220px; }
      .check-option { min-height: 106px; font-size: 32px; }
      .check-option input { width: 54px; height: 54px; min-height: 54px; }
      .schedule-top { flex-direction: column; }
      .schedule { padding: 16px 12px; }
      .admin-schedule { grid-template-columns: minmax(0, 1fr) 132px; gap: 10px; }
      .schedule h3 { font-size: 38px; line-height: 1.5; }
      .schedule p { margin: 12px 0; font-size: 33px; line-height: 1.55; }
      .badge { padding: 13px 16px; font-size: 28px; white-space: normal; }
      .schedule-actions { gap: 8px; margin-top: 14px; }
      .schedule-actions { grid-template-columns: minmax(0, 1fr); }
      .schedule-actions button { min-height: 112px; padding: 14px 8px; font-size: 30px; line-height: 1.5; }
      .reorder-actions { gap: 9px; }
      .reorder-actions button { min-height: 158px; padding: 14px 5px; }
      .reorder-actions .arrow { font-size: 66px; }
      .reorder-actions .move-label { font-size: 25px; font-weight: 800; }
      .toolbar { gap: 10px; }
      .toolbar .field { flex-basis: 100%; }
      .toolbar > button { width: 100%; }
      .primary, .secondary, .danger-quiet, .back { min-height: 106px; padding: 22px 24px; font-size: 32px; }
      .button-row > button { flex: 1 1 135px; }
      .slot { padding: 25px 20px; font-size: 33px; }
      .slot strong { font-size: 38px; }
      .slot button { min-height: 112px; font-size: 34px; }
      .editor-title { font-size: 41px; }
      .inline-entry h4 { font-size: 39px; }
      .empty { font-size: 31px; padding: 42px 20px; }
      .sheet-table { min-width: 2200px; font-size: 27px; }
      .sheet-table tr.note-row td { font-size: 25px; }
      .sheet-table td { height: 74px; }
      .modal-card { padding: 40px 22px; font-size: 34px; }
      .modal-card h3 { font-size: 41px; }
      .status-help { font-size: 30px; line-height: 1.65; }
    }

    /* 端末に保存した表示倍率を、文字と操作部品へまとめて反映する。 */
    body { font-size: 1rem; }
    .brand-mark { width: 2.12rem; height: 2.12rem; font-size: .85rem; }
    h1 { font-size: 1.18rem; }
    .subtitle { font-size: .79rem; }
    .home h2 { font-size: 1.47rem; }
    .home p { font-size: .91rem; }
    .big-button { min-height: 6.62rem; }
    .big-button span { font-size: 1.76rem; }
    .big-button strong { font-size: 1.21rem; }
    .big-button small { font-size: .85rem; }
    .section-head h2 { font-size: 1.24rem; }
    label { font-size: .94rem; }
    input, select, textarea { min-height: 3.06rem; font-size: 1rem; }
    textarea { min-height: 6.47rem; }
    .check-option { min-height: 3.12rem; font-size: .94rem; }
    .check-option input { width: 1.59rem; height: 1.59rem; min-height: 1.59rem; }
    .schedule h3 { font-size: 1.12rem; }
    .schedule p { font-size: .97rem; }
    .badge { font-size: .82rem; }
    .schedule-actions button { min-height: 3.29rem; font-size: .88rem; }
    .reorder-actions button { min-height: 4.65rem; }
    .reorder-actions .arrow { font-size: 1.94rem; }
    .reorder-actions .move-label { font-size: .74rem; }
    .primary, .secondary, .danger-quiet, .back { min-height: 3.12rem; font-size: .94rem; }
    .slot { font-size: .97rem; }
    .slot strong { font-size: 1.12rem; }
    .slot button { min-height: 3.29rem; font-size: 1rem; }
    .editor-title { font-size: 1.21rem; }
    .inline-entry h4 { font-size: 1.15rem; }
    .empty { font-size: .91rem; }
    .sheet-table { font-size: .79rem; }
    .sheet-table tr.note-row td { font-size: .74rem; }
    .sheet-table td { height: 2.18rem; }
    .modal-card { font-size: 1rem; }
    .modal-card h3 { font-size: 1.21rem; }
    .status-help { font-size: .88rem; }
    .size-control { font-size: 22px; }
    .size-control label { font-size: 1em; }
    .size-control input[type="range"] { min-height: 58px; font-size: inherit; }
    .size-control output, .size-mark { font-size: 1em; }
    @media (max-width: 560px) {
      .size-control { gap: 8px; padding: 10px 8px; flex-wrap: wrap; }
      .size-control label { width: 100%; text-align: center; }
      .size-control input[type="range"] { flex-basis: 190px; width: auto; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <img class="brand-mark" src="https://raw.githubusercontent.com/ikedacong18119/pw-app-assets/main/pw_icon.png" alt="PW">
      <div><h1>PW申し込みアプリ</h1><p class="subtitle">予定の確認・参加申し込み</p></div>
    </div>
  </header>

  <div class="size-control" aria-label="表示サイズの調整">
    <label for="uiScale">文字・ボタンの大きさ</label>
    <span class="size-mark">小</span>
    <input id="uiScale" type="range" min="20" max="150" step="1" value="100" oninput="updateUiScale(this.value)" onchange="saveUiScale(this.value)">
    <span class="size-mark">大</span>
    <output id="uiScaleValue" for="uiScale">100%</output>
  </div>

  <main>
    <section id="home" class="panel home">
      <h2>ようこそ</h2>
      <p>ご利用になるメニューを選んでください。</p>
      <div class="home-actions">
        <button class="big-button" onclick="openParticipant()"><span>🙋</span><strong>参加希望者</strong><small>申し込みはこちらから</small></button>
        <button class="big-button" onclick="openStatus()"><span>📋</span><strong>現在の申し込み状況</strong><small>確認と申し込みの削除はこちらから</small></button>
        <button class="big-button" onclick="showPage('login')"><span>🔐</span><strong>管理者</strong><small>予定の追加修正はこちらから</small></button>
      </div>
    </section>

    <section id="login" class="panel hidden">
      <div class="section-head"><button class="back" onclick="showPage('home')">← 戻る</button><h2>管理者ログイン</h2></div>
      <div id="loginNotice"></div>
      <div class="field" style="max-width:420px">
        <label for="password">管理者パスワード</label>
        <input id="password" type="password" inputmode="numeric" autocomplete="current-password" onkeydown="if(event.key==='Enter') loginAdmin()">
      </div>
      <div class="button-row"><button class="primary" onclick="loginAdmin()">ログイン</button></div>
    </section>

    <section id="participant" class="panel hidden">
      <div class="section-head"><button class="back" onclick="showPage('home')">← 戻る</button><h2>参加申し込み</h2></div>
      <div id="participantNotice"></div>
      <div class="toolbar">
        <div class="field"><label for="participantMonth">年月</label><select id="participantMonth" onchange="loadParticipantSchedules()"></select></div>
      </div>
      <div id="participantSchedules" class="schedule-list"></div>
    </section>

    <section id="status" class="panel hidden">
      <div class="section-head"><button class="back" onclick="showPage('home')">← 戻る</button><h2>現在の申し込み状況</h2></div>
      <div id="statusNotice"></div>
      <div class="toolbar">
        <div class="field"><label for="statusMonth">年月</label><select id="statusMonth" onchange="loadStatus()"></select></div>
      </div>
      <p class="status-help">取り消す場合は、一覧のご自分のお名前を選択してください。</p>
      <div id="statusTables"></div>
    </section>

    <section id="admin" class="panel hidden">
      <div class="section-head"><button class="back" onclick="logoutAdmin()">← 終了</button><h2>管理者ページ</h2></div>
      <div id="adminNotice"></div>
      <div id="adminModes" class="mode-actions">
        <button class="big-button" onclick="showAdminMode('create')"><span>＋</span>新しい月の追加</button>
        <button class="big-button" onclick="showAdminMode('edit')"><span>✎</span>既存の月を修正</button>
      </div>

      <div id="createMode" class="hidden">
        <h3 class="editor-title">新しい月の追加</h3>
        <div class="grid">
          <div class="field"><label for="newYear">年</label><select id="newYear"></select></div>
          <div class="field"><label for="newMonth">月</label><select id="newMonth"></select></div>
        </div>
        <div class="button-row"><button class="primary" onclick="createNewMonth()">新しい月を追加</button><button class="secondary" onclick="showAdminMode('menu')">戻る</button></div>
      </div>

      <div id="editMode" class="hidden">
        <div class="toolbar">
          <div class="field"><label for="adminMonth">修正する年月</label><select id="adminMonth" onchange="loadAdminSchedules()"></select></div>
          <button class="secondary" onclick="showAdminMode('menu')">メニューへ</button>
        </div>
        <div id="adminSchedules" class="schedule-list"></div>
        <div class="divider"></div>
        <h3 id="scheduleFormTitle" class="editor-title">予定を追加</h3>
        <input id="blockIndex" type="hidden">
        <div class="grid">
          <div class="field full"><label for="scheduleDate">① PW予定日 *</label><input id="scheduleDate" type="date"></div>
          <div id="locationRow" class="location-grid single">
            <div class="field"><label for="location">② 集合場所 *</label><select id="location" onchange="toggleGatheringTime()"></select></div>
            <div id="gatheringTimeField" class="field hidden"><label for="gatheringTime">集まり時間 *</label><input id="gatheringTime" type="time"></div>
          </div>
          <div class="field"><label for="firstTime">③ 時間（前半）*</label><input id="firstTime" value="16:00~17:00" placeholder="例：16:00~17:00"></div>
          <div class="field"><label for="secondTime">④ 時間（後半）*</label><input id="secondTime" value="17:00~18:00" placeholder="例：17:00~18:00"></div>
          <div class="field"><label for="firstLeader">⑤ 責任者（前半）*</label><input id="firstLeader"></div>
          <div class="field"><label for="secondLeader">⑥ 責任者（後半）*</label><input id="secondLeader"></div>
        </div>
        <div class="button-row"><button class="primary" onclick="saveAdminSchedule()">保存</button><button class="secondary" onclick="resetScheduleForm()">新規入力に戻す</button></div>
      </div>
    </section>
  </main>

  <div id="loading" class="loading"><div class="loader"><span class="spinner"></span><span id="loadingText">読み込み中…</span></div></div>
  <div id="deleteModal" class="modal hidden">
    <div class="modal-card">
      <h3>申し込みを削除</h3>
      <p id="deleteQuestion"></p>
      <div class="button-row"><button class="primary" onclick="confirmDeleteEntry()">はい</button><button class="secondary" onclick="closeDeleteModal()">いいえ</button></div>
    </div>
  </div>
  <div id="adminDeleteModal" class="modal hidden">
    <div class="modal-card">
      <h3>予定を削除</h3>
      <p id="adminDeleteQuestion"></p>
      <div class="button-row"><button class="danger-quiet" onclick="confirmDeleteSchedule()">削除する</button><button class="secondary" onclick="closeAdminDeleteModal()">キャンセル</button></div>
    </div>
  </div>
  <div id="messageModal" class="modal hidden">
    <div class="modal-card">
      <h3 id="messageTitle"></h3>
      <p id="messageBody"></p>
      <div class="button-row"><button class="primary" onclick="closeMessagePopup()">閉じる</button></div>
    </div>
  </div>

  <script>
    const state = { months: [], locations: [], currentMonth: '', adminPassword: '', adminSchedules: [], participantSchedules: [], entrySelections: [], applicantName: '', statusBlocks: [], statusEntries: [], deleteTarget: null, adminDeleteTarget: null };
    const $ = id => document.getElementById(id);
    const esc = value => String(value ?? '').replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
    const callServer = (name, ...args) => new Promise((resolve, reject) => {
      google.script.run.withSuccessHandler(resolve).withFailureHandler(err => reject(new Error(err.message || String(err))))[name](...args);
    });

    const UI_SCALE_KEY = 'pw-ui-scale-v2';
    let uiScaleFrame = 0;
    let pendingUiScale = 100;
    initializeUiScale();
    window.addEventListener('load', initialize);

    function initializeUiScale() {
      let saved = 100;
      try { saved = Number(localStorage.getItem(UI_SCALE_KEY)) || 100; } catch (err) {}
      saved = Math.min(150, Math.max(20, saved));
      $('uiScale').value = saved;
      applyUiScale(saved);
    }

    function updateUiScale(value) {
      const scale = Math.min(150, Math.max(20, Number(value) || 100));
      pendingUiScale = scale;
      $('uiScaleValue').textContent = `${scale}%`;
      if (uiScaleFrame) return;
      uiScaleFrame = window.requestAnimationFrame(() => {
        applyUiScale(pendingUiScale);
        uiScaleFrame = 0;
      });
    }

    function saveUiScale(value) {
      const scale = Math.min(150, Math.max(20, Number(value) || 100));
      updateUiScale(scale);
      try { localStorage.setItem(UI_SCALE_KEY, String(scale)); } catch (err) {}
    }

    function applyUiScale(scale) {
      const largeLayout = window.matchMedia('(max-width: 1000px), (hover: none), (pointer: coarse)').matches;
      // 旧版の65%相当を、新版では100%の標準サイズとする。
      const baseSize = largeLayout ? 22 : 12;
      document.documentElement.style.fontSize = `${baseSize * scale / 100}px`;
      $('uiScaleValue').textContent = `${scale}%`;
    }

    async function initialize() {
      try {
        const data = await callServer('getBootstrapData');
        state.months = data.months || [];
        state.locations = data.locations || [];
        state.currentMonth = data.currentMonth || '';
        fillMonthSelects();
        fillLocations();
        fillYearMonth();
      } catch (err) { showNotice('loginNotice', err.message, false); }
      finally { setLoading(false); }
    }

    function showPage(id) {
      ['home','login','participant','status','admin'].forEach(page => $(page).classList.toggle('hidden', page !== id));
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function openParticipant() {
      showPage('participant');
      await loadParticipantSchedules();
    }

    async function openStatus() {
      showPage('status');
      await loadStatus();
    }

    async function loginAdmin() {
      clearNotice('loginNotice');
      const password = $('password').value;
      if (!password) return showNotice('loginNotice', 'パスワードを入力してください。', false);
      setLoading(true);
      try {
        const ok = await callServer('checkAdminPassword', password);
        if (!ok) return showNotice('loginNotice', 'パスワードが違います。', false);
        state.adminPassword = password;
        $('password').value = '';
        showPage('admin');
        showAdminMode('menu');
      } catch (err) { showNotice('loginNotice', err.message, false); }
      finally { setLoading(false); }
    }

    function logoutAdmin() {
      state.adminPassword = '';
      resetScheduleForm();
      showPage('home');
    }

    function showAdminMode(mode) {
      $('adminModes').classList.toggle('hidden', mode !== 'menu');
      $('createMode').classList.toggle('hidden', mode !== 'create');
      $('editMode').classList.toggle('hidden', mode !== 'edit');
      clearNotice('adminNotice');
      if (mode === 'edit') loadAdminSchedules();
    }

    async function createNewMonth() {
      setLoading(true); clearNotice('adminNotice');
      try {
        const result = await callServer('createMonth', state.adminPassword, $('newYear').value, $('newMonth').value);
        state.months = result.months;
        fillMonthSelects(result.sheetName);
        showAdminMode('edit');
        showNotice('adminNotice', `${result.sheetName} シートを作成しました。続けて予定を入力できます。`, true);
      } catch (err) { showNotice('adminNotice', err.message, false); }
      finally { setLoading(false); }
    }

    async function loadAdminSchedules() {
      const month = $('adminMonth').value;
      if (!month) { $('adminSchedules').innerHTML = '<div class="empty">年月シートがまだありません。</div>'; return; }
      setLoading(true);
      try {
        state.adminSchedules = await callServer('getMonthSchedules', month);
        renderAdminSchedules();
        resetScheduleForm();
      } catch (err) { showNotice('adminNotice', err.message, false); }
      finally { setLoading(false); }
    }

    function renderAdminSchedules() {
      const box = $('adminSchedules');
      if (!state.adminSchedules.length) { box.innerHTML = '<div class="empty">予定はまだありません。下のフォームから追加してください。</div>'; return; }
      box.innerHTML = state.adminSchedules.map((s, i) => `
        <article class="schedule admin-schedule">
          <div class="admin-schedule-main">
            <div class="schedule-top"><div><h3>${esc(s.date)}　${esc(s.location)}</h3><p>前半 ${esc(s.firstTime)}／${esc(s.firstLeader)}</p><p>後半 ${esc(s.secondTime)}／${esc(s.secondLeader)}</p></div><span class="badge">前半 ${s.firstPeople}/24・後半 ${s.secondPeople}/24</span></div>
            <div class="schedule-actions">
              <button class="secondary" onclick="editSchedule(${i})">この予定を修正</button>
              <button class="danger-quiet" onclick="askDeleteSchedule(${i})">この予定を削除</button>
            </div>
          </div>
          <div class="reorder-actions" aria-label="予定の順番変更">
            <button class="secondary" onclick="moveAdminSchedule(${i}, -1)" ${i === 0 ? 'disabled' : ''}><span class="arrow">↑</span><span class="move-label">一つ前へ</span></button>
            <button class="secondary" onclick="moveAdminSchedule(${i}, 1)" ${i === state.adminSchedules.length - 1 ? 'disabled' : ''}><span class="arrow">↓</span><span class="move-label">一つ後へ</span></button>
          </div>
        </article>`).join('');
    }

    function editSchedule(index) {
      const s = state.adminSchedules[index];
      $('blockIndex').value = s.blockIndex;
      $('scheduleDate').value = s.dateIso || '';
      $('location').value = s.locationType || s.location;
      $('gatheringTime').value = s.gatheringTime || '';
      toggleGatheringTime();
      $('firstTime').value = s.firstTime;
      $('secondTime').value = s.secondTime;
      $('firstLeader').value = s.firstLeader;
      $('secondLeader').value = s.secondLeader;
      $('scheduleFormTitle').textContent = `${s.date} の予定を修正`;
      $('scheduleFormTitle').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function resetScheduleForm() {
      ['blockIndex','scheduleDate','gatheringTime','firstLeader','secondLeader'].forEach(id => $(id).value = '');
      $('firstTime').value = '16:00~17:00';
      $('secondTime').value = '17:00~18:00';
      if (state.locations.length) $('location').value = state.locations[0];
      toggleGatheringTime();
      $('scheduleFormTitle').textContent = '予定を追加';
    }

    function toggleGatheringTime() {
      const needsTime = $('location').value === '集まりKH';
      $('gatheringTimeField').classList.toggle('hidden', !needsTime);
      $('locationRow').classList.toggle('single', !needsTime);
      $('gatheringTime').required = needsTime;
      if (!needsTime) $('gatheringTime').value = '';
    }

    async function saveAdminSchedule() {
      clearNotice('adminNotice');
      const payload = {
        sheetName: $('adminMonth').value,
        blockIndex: $('blockIndex').value,
        date: $('scheduleDate').value,
        location: $('location').value,
        gatheringTime: $('gatheringTime').value,
        firstTime: $('firstTime').value,
        secondTime: $('secondTime').value,
        firstLeader: $('firstLeader').value,
        secondLeader: $('secondLeader').value,
      };
      setLoading(true);
      try {
        const result = await callServer('saveSchedule', state.adminPassword, payload);
        state.adminSchedules = result.schedules;
        renderAdminSchedules();
        resetScheduleForm();
        showNotice('adminNotice', result.message, true);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (err) { showNotice('adminNotice', err.message, false); }
      finally { setLoading(false); }
    }

    function askDeleteSchedule(index) {
      const schedule = state.adminSchedules[index];
      if (!schedule) return;
      state.adminDeleteTarget = schedule;
      const applicantMessage = schedule.applicantCount
        ? ` 参加者${schedule.applicantCount}名の申し込みもすべて削除されます。`
        : '';
      $('adminDeleteQuestion').textContent = `${schedule.date} の予定を削除しますか？${applicantMessage}`;
      $('adminDeleteModal').classList.remove('hidden');
    }

    function closeAdminDeleteModal() {
      $('adminDeleteModal').classList.add('hidden');
      state.adminDeleteTarget = null;
    }

    async function confirmDeleteSchedule() {
      const schedule = state.adminDeleteTarget;
      if (!schedule) return closeAdminDeleteModal();
      const payload = { sheetName: $('adminMonth').value, blockIndex: schedule.blockIndex };
      setLoading(true, '予定を削除中…');
      clearNotice('adminNotice');
      try {
        const result = await callServer('deleteSchedule', state.adminPassword, payload);
        state.adminSchedules = result.schedules;
        closeAdminDeleteModal();
        renderAdminSchedules();
        resetScheduleForm();
        showNotice('adminNotice', result.message, true);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (err) {
        closeAdminDeleteModal();
        showNotice('adminNotice', err.message, false);
      } finally { setLoading(false); }
    }

    async function moveAdminSchedule(index, direction) {
      const schedule = state.adminSchedules[index];
      if (!schedule || ![-1, 1].includes(direction)) return;
      const payload = {
        sheetName: $('adminMonth').value,
        blockIndex: schedule.blockIndex,
        direction,
      };
      setLoading(true, '順番を変更中…');
      clearNotice('adminNotice');
      try {
        const result = await callServer('moveSchedule', state.adminPassword, payload);
        state.adminSchedules = result.schedules;
        renderAdminSchedules();
        resetScheduleForm();
        showNotice('adminNotice', result.message, true);
      } catch (err) {
        showNotice('adminNotice', err.message, false);
      } finally { setLoading(false); }
    }

    async function loadParticipantSchedules() {
      const month = $('participantMonth').value;
      state.entrySelections = [];
      state.applicantName = '';
      if (!month) { $('participantSchedules').innerHTML = '<div class="empty">公開中の年月シートがまだありません。</div>'; return; }
      setLoading(true); clearNotice('participantNotice');
      try {
        state.participantSchedules = await callServer('getMonthSchedules', month);
        renderParticipantSchedules();
      } catch (err) { showNotice('participantNotice', err.message, false); }
      finally { setLoading(false); }
    }

    function renderParticipantSchedules() {
      const box = $('participantSchedules');
      if (!state.participantSchedules.length) { box.innerHTML = '<div class="empty">この月の予定はまだありません。</div>'; return; }
      box.innerHTML = state.participantSchedules.map((s, i) => `
        <article class="schedule">
          <div class="schedule-top"><div><h3>${esc(s.date)}</h3><p>集合場所：${esc(s.location)}</p></div></div>
          <div class="slots">
            ${slotHtml(s, i, 'first', '前半', s.firstTime, s.firstLeader, s.firstRemaining)}
            ${slotHtml(s, i, 'second', '後半', s.secondTime, s.secondLeader, s.secondRemaining)}
          </div>
          ${inlineEntryHtml(s)}
        </article>`).join('');
    }

    function slotHtml(s, index, period, label, time, leader, remaining) {
      const selected = state.entrySelections.some(entry => entry.blockIndex === s.blockIndex && entry.period === period);
      const disabled = remaining <= 0 && !selected ? 'disabled' : '';
      const caption = selected ? '選択済み（押すと解除）' : (remaining <= 0 ? '定員に達しました' : `選択する（残り${remaining}名）`);
      const buttonClass = selected ? 'selected' : (remaining <= 0 ? 'secondary' : 'primary');
      return `<div class="slot"><strong>${label}　${esc(time)}</strong><div>責任者：${esc(leader)}</div><button class="${buttonClass}" ${disabled} onclick="toggleEntrySelection(${index}, '${period}')">${caption}</button></div>`;
    }

    function toggleEntrySelection(index, period) {
      const s = state.participantSchedules[index];
      const foundIndex = state.entrySelections.findIndex(entry => entry.blockIndex === s.blockIndex && entry.period === period);
      if (foundIndex >= 0) {
        state.entrySelections.splice(foundIndex, 1);
      } else {
        state.entrySelections.push({
          blockIndex: s.blockIndex,
          period,
          label: `${s.date}／${period === 'first' ? `前半 ${s.firstTime}` : `後半 ${s.secondTime}`}`,
          wish: '',
          leaderCapable: false,
        });
      }
      renderParticipantSchedules();
      if (foundIndex < 0) {
        const panel = $(`inlineEntry${s.blockIndex}`);
        if (panel) panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    function inlineEntryHtml(schedule) {
      const selected = state.entrySelections
        .map((entry, index) => ({ entry, index }))
        .filter(item => item.entry.blockIndex === schedule.blockIndex);
      if (!selected.length) return '';
      const lastSelection = state.entrySelections[state.entrySelections.length - 1];
      const showSaveButton = lastSelection && lastSelection.blockIndex === schedule.blockIndex;
      return `<div id="inlineEntry${schedule.blockIndex}" class="inline-entry">
        <h4>申し込み内容</h4>
        <div class="grid">
          <div class="field full"><label>お名前 *</label><input class="applicant-name" maxlength="40" value="${esc(state.applicantName)}" oninput="syncApplicantName(this.value)"></div>
        </div>
        ${selected.map(item => `<div class="selection-item">
          <strong>${esc(item.entry.label)}</strong>
          <div class="grid">
            <div class="field"><label for="selectionWish${item.index}">希望・連絡事項（任意）</label><textarea id="selectionWish${item.index}" maxlength="500" placeholder="この予定についての希望・連絡事項" oninput="updateSelectionWish(${item.index}, this.value)">${esc(item.entry.wish || '')}</textarea></div>
            <div class="field"><label>責任者について（兄弟のみ）</label><label class="check-option"><input type="checkbox" ${item.entry.leaderCapable ? 'checked' : ''} onchange="updateSelectionLeaderCapable(${item.index}, this.checked)">責任者可能</label></div>
          </div>
        </div>`).join('')}
        ${showSaveButton ? '<div class="button-row"><button class="primary" onclick="submitParticipantEntry()">選択した予定をまとめて保存</button></div>' : ''}
      </div>`;
    }

    function syncApplicantName(value) {
      state.applicantName = value;
      document.querySelectorAll('.applicant-name').forEach(input => { if (input.value !== value) input.value = value; });
    }

    function updateSelectionWish(index, value) {
      if (state.entrySelections[index]) state.entrySelections[index].wish = value;
    }

    function updateSelectionLeaderCapable(index, checked) {
      if (state.entrySelections[index]) state.entrySelections[index].leaderCapable = checked;
    }

    async function submitParticipantEntry() {
      if (!state.entrySelections.length) return showNotice('participantNotice', '希望日時を1つ以上選択してください。', false);
      const payload = {
        sheetName: $('participantMonth').value,
        entries: state.entrySelections.map(entry => ({ blockIndex: entry.blockIndex, period: entry.period, wish: entry.wish || '', leaderCapable: entry.leaderCapable === true })),
        name: state.applicantName,
      };
      setLoading(true, '保存中…'); clearNotice('participantNotice');
      try {
        const result = await callServer('submitEntries', payload);
        state.participantSchedules = result.schedules;
        state.entrySelections = [];
        state.applicantName = '';
        renderParticipantSchedules();
        showNotice('participantNotice', result.message, true);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (err) { showNotice('participantNotice', err.message, false); }
      finally { setLoading(false); }
    }

    async function loadStatus() {
      const month = $('statusMonth').value;
      state.deleteTarget = null;
      closeDeleteModal();
      if (!month) {
        $('statusTables').innerHTML = '<div class="empty">公開中の年月シートがまだありません。</div>';
        return;
      }
      setLoading(true); clearNotice('statusNotice');
      try {
        state.statusBlocks = await callServer('getMonthStatus', month);
        renderStatus();
      } catch (err) { showNotice('statusNotice', err.message, false); }
      finally { setLoading(false); }
    }

    function renderStatus() {
      const box = $('statusTables');
      state.statusEntries = [];
      if (!state.statusBlocks.length) {
        box.innerHTML = '<div class="empty">この月の予定はまだありません。</div>';
        return;
      }

      box.innerHTML = state.statusBlocks.map(block => {
        const entryMap = {};
        block.entries.forEach(entry => {
          const index = state.statusEntries.push(entry) - 1;
          entryMap[`${entry.rowOffset}:${entry.column}`] = index;
        });

        const body = block.rows.map((row, rowOffset) => {
          const classes = [];
          if ([0, 2, 4, 6].includes(rowOffset)) classes.push('name-row');
          if ([1, 3, 5, 7].includes(rowOffset)) classes.push('note-row');
          if ([3, 7].includes(rowOffset)) classes.push('period-end');
          let cells = '';
          if (rowOffset === 0) {
            cells += `<td rowspan="8" class="wide-cell">${esc(row[0]) || '&nbsp;'}</td>`;
            cells += `<td rowspan="8" class="wide-cell">${esc(row[1]) || '&nbsp;'}</td>`;
            cells += `<td rowspan="4" class="wide-cell">${esc(formatTimeForStatus(row[2])) || '&nbsp;'}</td>`;
          } else if (rowOffset === 4) {
            cells += `<td rowspan="4" class="wide-cell">${esc(formatTimeForStatus(row[2])) || '&nbsp;'}</td>`;
          }

          for (let column = 4; column <= 15; column += 1) {
            const value = row[column - 1] || '';
            const entryIndex = entryMap[`${rowOffset}:${column}`];
            if (entryIndex !== undefined) {
              cells += `<td class="entry-cell"><button class="status-name" onclick="askDeleteEntry(${entryIndex})">${esc(value)}</button></td>`;
            } else {
              cells += `<td class="entry-cell">${esc(value) || '&nbsp;'}</td>`;
            }
          }
          return `<tr class="${classes.join(' ')}">${cells}</tr>`;
        }).join('');

        return `<div class="scroll-hint"><span class="scroll-hint-arrow">↔</span><span>予定表は左右にスライドして見られます</span></div><div class="status-table-wrap"><div class="status-block"><table class="sheet-table"><thead><tr><th>日付</th><th>集合場所</th><th>時間</th><th colspan="2">責任者</th><th colspan="10">参加者</th></tr></thead><tbody>${body}</tbody></table></div><div class="scroll-edge">›</div></div>`;
      }).join('');
    }

    function formatTimeForStatus(value) {
      return String(value || '').replace(/([～~])/g, '$1\n');
    }

    function askDeleteEntry(index) {
      const entry = state.statusEntries[index];
      if (!entry) return;
      state.deleteTarget = entry;
      const dateLabel = String(entry.date || '').replace(/[\(（][^\)）]*[\)）]/g, '').trim();
      const periodLabel = entry.period === 'first' ? '前半' : '後半';
      $('deleteQuestion').textContent = `本当に${entry.name}さんですか？\n${dateLabel}（${periodLabel}）の申し込みを削除しますか？`;
      $('deleteModal').classList.remove('hidden');
    }

    function closeDeleteModal() {
      $('deleteModal').classList.add('hidden');
      state.deleteTarget = null;
    }

    async function confirmDeleteEntry() {
      const entry = state.deleteTarget;
      if (!entry) return closeDeleteModal();
      const payload = {
        sheetName: $('statusMonth').value,
        blockIndex: entry.blockIndex,
        period: entry.period,
        cellA1: entry.cellA1,
        name: entry.name,
      };
      setLoading(true, '削除中…'); clearNotice('statusNotice');
      try {
        const result = await callServer('deleteEntry', payload);
        state.statusBlocks = result.status;
        closeDeleteModal();
        renderStatus();
        showNotice('statusNotice', result.message, true);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (err) {
        closeDeleteModal();
        showNotice('statusNotice', err.message, false);
      } finally { setLoading(false); }
    }

    function fillMonthSelects(selected) {
      const currentIndex = monthIndex(state.currentMonth);
      const availableMonths = state.months
        .filter(month => monthIndex(month) >= currentIndex)
        .sort((a, b) => monthIndex(a) - monthIndex(b));

      ['participantMonth','statusMonth'].forEach(id => {
        const select = $(id);
        select.innerHTML = availableMonths.length
          ? availableMonths.map(month => `<option value="${esc(month)}">${esc(month)}</option>`).join('')
          : '<option value="">今月以降の年月シートなし</option>';
        if (!availableMonths.length) return;
        select.value = availableMonths.includes(state.currentMonth) ? state.currentMonth : availableMonths[0];
      });

      const adminSelect = $('adminMonth');
      adminSelect.innerHTML = state.months.length
        ? state.months.map(month => `<option value="${esc(month)}">${esc(month)}</option>`).join('')
        : '<option value="">年月シートなし</option>';
      if (selected && state.months.includes(selected)) adminSelect.value = selected;
    }

    function monthIndex(value) {
      const parts = String(value || '').split('.').map(Number);
      return parts.length === 2 && Number.isInteger(parts[0]) && Number.isInteger(parts[1])
        ? parts[0] * 12 + parts[1] - 1
        : Number.NEGATIVE_INFINITY;
    }

    function fillLocations() {
      $('location').innerHTML = state.locations.map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join('');
    }

    function fillYearMonth() {
      const now = new Date();
      $('newYear').innerHTML = Array.from({length: 6}, (_, i) => now.getFullYear() - 1 + i).map(y => `<option value="${y}" ${y===now.getFullYear()?'selected':''}>${y}年</option>`).join('');
      $('newMonth').innerHTML = Array.from({length: 12}, (_, i) => i + 1).map(m => `<option value="${m}" ${m===now.getMonth()+1?'selected':''}>${m}月</option>`).join('');
    }

    function showNotice(id, message, ok) {
      if (id && $(id)) $(id).innerHTML = '';
      $('messageTitle').textContent = ok ? '完了' : 'エラー';
      $('messageBody').textContent = message;
      $('messageModal').classList.remove('hidden');
    }
    function closeMessagePopup() { $('messageModal').classList.add('hidden'); }
    function clearNotice(id) { if (id && $(id)) $(id).innerHTML = ''; }
    function setLoading(on, message) {
      if (on) $('loadingText').textContent = message || '読み込み中…';
      $('loading').classList.toggle('hidden', !on);
    }
  </script>
</body>
</html>
