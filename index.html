<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17324d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="PW申し込み">
  <title>PW申し込みアプリ</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./pw_icon.png" type="image/png">
  <link rel="apple-touch-icon" href="./pw_icon.png">
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #f5f8fc; }
    iframe { display: block; width: 100%; height: 100%; border: 0; background: #f5f8fc; }
    .fallback { position: fixed; inset: auto 12px 12px; z-index: 2; text-align: center; }
    .fallback a { display: inline-block; padding: 10px 14px; border-radius: 10px; background: #17324d; color: white; font: 700 16px/1.4 sans-serif; text-decoration: none; }
  </style>
</head>
<body>
  <iframe
    title="PW申し込みアプリ"
    src="https://script.google.com/macros/s/AKfycbx462oP77DQ1OCQgkOlElPez7GYJXqGLNbzVJZEQlL6E2cBp-DXIvUIYkWA3cmczNdijA/exec"
    allow="clipboard-write"
  ></iframe>
  <noscript class="fallback"><a href="https://script.google.com/macros/s/AKfycbx462oP77DQ1OCQgkOlElPez7GYJXqGLNbzVJZEQlL6E2cBp-DXIvUIYkWA3cmczNdijA/exec">アプリを開く</a></noscript>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
    }
  </script>
</body>
</html>
