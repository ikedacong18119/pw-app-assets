<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17324d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="PW申し込み">
  <title>PW申し込みアプリ</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./pw_icon.png" type="image/png">
  <link rel="apple-touch-icon" href="./pw_icon.png">
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; min-height: 100%; margin: 0; background: #f5f8fc; }
    body { display: grid; place-items: center; padding: 24px; color: #17324d; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif; text-align: center; }
    main { width: min(520px, 100%); padding: 32px 20px; border-radius: 20px; background: white; box-shadow: 0 14px 35px rgba(28,50,74,.12); }
    img { width: 112px; height: 112px; border-radius: 22px; object-fit: cover; }
    h1 { margin: 18px 0 8px; font-size: 28px; }
    p { margin: 0 0 22px; font-size: 18px; }
    a { display: block; min-height: 64px; padding: 17px 18px; border-radius: 14px; background: #17324d; color: white; font-size: 21px; font-weight: 800; text-decoration: none; }
  </style>
</head>
<body>
  <main>
    <img src="./pw_icon.png" alt="PW申し込みアプリ">
    <h1>PW申し込みアプリ</h1>
    <p>アプリを開いています…</p>
    <a id="openApp" href="https://script.google.com/macros/s/AKfycbx462oP77DQ1OCQgkOlElPez7GYJXqGLNbzVJZEQlL6E2cBp-DXIvUIYkWA3cmczNdijA/exec">開かない場合はこちら</a>
  </main>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
    }
    const appUrl = document.getElementById('openApp').href;
    window.setTimeout(() => window.location.replace(appUrl), 350);
  </script>
</body>
</html>
